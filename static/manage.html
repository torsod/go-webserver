<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDP Manage - Offerings & Orders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #1a1a1a; color: #e0e0e0; min-height: 100vh; padding: 20px; }
        h1 { color: #00ccff; font-size: 1.6em; margin-bottom: 6px; }
        h2 { color: #00ccff; font-size: 1.2em; margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 6px; }
        h3 { color: #aaa; font-size: 1em; margin: 14px 0 8px; }
        .top-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        .top-bar a { color: #00ccff; text-decoration: none; font-size: 0.85em; }
        .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #333; }
        .tab { padding: 10px 24px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: #ccc; }
        .tab.active { color: #00ccff; border-bottom-color: #00ccff; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 800px; }
        .form-grid.wide { grid-template-columns: 1fr 1fr 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 0.8em; color: #888; }
        input, select { background: #2d2d2d; border: 1px solid #404040; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-family: inherit; font-size: 0.9em; }
        input:focus, select:focus { outline: none; border-color: #00ccff; }
        input[type="number"] { -moz-appearance: textfield; }
        button { background: #00ccff; color: #1a1a1a; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.9em; transition: all 0.2s; }
        button:hover { background: #00aadd; }
        button.secondary { background: #404040; color: #e0e0e0; }
        button.secondary:hover { background: #555; }
        button.danger { background: #cc3333; color: #fff; }
        button.danger:hover { background: #aa2222; }
        .btn-row { display: flex; gap: 10px; margin-top: 14px; }
        .result { margin-top: 14px; padding: 10px; border-radius: 4px; font-size: 0.85em; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        .result.success { background: #1a3a1a; border: 1px solid #4caf50; color: #4caf50; }
        .result.error { background: #3a1a1a; border: 1px solid #f44336; color: #f44336; }
        .result.info { background: #1a2a3a; border: 1px solid #2196F3; color: #90caf9; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 10px; }
        th { background: #2d2d2d; padding: 8px 10px; text-align: left; color: #00ccff; border-bottom: 2px solid #404040; }
        td { padding: 6px 10px; border-bottom: 1px solid #333; }
        tr:hover { background: #252525; }
        .badge { padding: 2px 8px; border-radius: 3px; font-size: 0.8em; font-weight: 600; }
        .badge.NEW { background: #1a3a5a; color: #4fc3f7; }
        .badge.UPCOMING { background: #3a3a1a; color: #ffd54f; }
        .badge.OPEN { background: #1a3a1a; color: #4caf50; }
        .badge.CLOSE_PENDING, .badge.CLOSING, .badge.CLEARING { background: #3a2a1a; color: #ffb74d; }
        .badge.CLOSED { background: #2d2d2d; color: #888; }
        .badge.HALTED { background: #3a1a1a; color: #f44336; }
        .badge.CANCELED { background: #2d2d2d; color: #666; }
        .badge.ACTIVE { background: #1a3a1a; color: #4caf50; }
        .badge.BID { background: #1a3a1a; color: #4caf50; }
        .badge.OFFER { background: #3a1a1a; color: #ef5350; }
        .clickable { cursor: pointer; color: #00ccff; text-decoration: underline; }
        .empty { color: #666; font-style: italic; padding: 20px; text-align: center; }
        .refresh-btn { font-size: 0.8em; padding: 4px 12px; margin-left: 10px; }
        .state-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .state-btns button { font-size: 0.8em; padding: 6px 12px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>PDP Manage</h1>
        <a href="/">← Home</a>
        <a href="/api-test.html">API Tester</a>
        <a href="/api-client.html">WebSocket Client</a>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('offerings')">Offerings</div>
        <div class="tab" onclick="switchTab('orders')">Orders</div>
        <div class="tab" onclick="switchTab('fix')">FIX</div>
    </div>

    <!-- ===== OFFERINGS TAB ===== -->
    <div class="panel active" id="panel-offerings">
        <h2>Create Offering <button class="secondary refresh-btn" onclick="loadOfferings()">↻ Refresh List</button></h2>

        <div class="form-grid">
            <div class="form-group"><label>Symbol *</label><input id="o-symbol" placeholder="e.g. LNRG"></div>
            <div class="form-group"><label>Name *</label><input id="o-name" placeholder="e.g. LunarEnergy Inc."></div>
            <div class="form-group"><label>Issuer *</label><input id="o-issuer" placeholder="e.g. LunarEnergy"></div>
            <div class="form-group"><label>Market</label><input id="o-market" value="CB"></div>
            <div class="form-group"><label>Asset Type</label>
                <select id="o-assetType">
                    <option value="STOCK">STOCK</option>
                    <option value="BOND">BOND</option>
                    <option value="FUND_ETF">FUND_ETF</option>
                </select>
            </div>
            <div class="form-group"><label>Security Type</label>
                <select id="o-securityType">
                    <option value="CS">CS (Common Stock)</option>
                    <option value="PS">PS (Preferred)</option>
                    <option value="CORP">CORP (Bond)</option>
                    <option value="MUNI">MUNI (Municipal)</option>
                    <option value="MF">MF (Mutual Fund)</option>
                    <option value="ETF">ETF</option>
                </select>
            </div>
        </div>

        <h3>Pricing</h3>
        <div class="form-grid wide">
            <div class="form-group"><label>Min Price Allowed</label><input id="o-minPrice" type="number" step="0.01" value="10.00"></div>
            <div class="form-group"><label>Max Price Allowed</label><input id="o-maxPrice" type="number" step="0.01" value="50.00"></div>
            <div class="form-group"><label>Min Acceptable IPO Price</label><input id="o-minIPO" type="number" step="0.01" value="15.00"></div>
            <div class="form-group"><label>Low Price Range</label><input id="o-lowRange" type="number" step="0.01" value="18.00"></div>
            <div class="form-group"><label>High Price Range</label><input id="o-highRange" type="number" step="0.01" value="22.00"></div>
            <div class="form-group"><label>Price Increment</label><input id="o-priceInc" type="number" step="0.01" value="0.01"></div>
        </div>

        <h3>Quantities</h3>
        <div class="form-grid wide">
            <div class="form-group"><label>Primary Quantity</label><input id="o-primaryQty" type="number" value="1000000"></div>
            <div class="form-group"><label>Upsize Quantity</label><input id="o-upsizeQty" type="number" value="0"></div>
            <div class="form-group"><label>Min Bid Quantity</label><input id="o-minBidQty" type="number" value="100"></div>
            <div class="form-group"><label>Max Bid Quantity</label><input id="o-maxBidQty" type="number" value="500000"></div>
            <div class="form-group"><label>Qty Increment</label><input id="o-qtyInc" type="number" value="100"></div>
            <div class="form-group"><label>Min Alloc Per Account</label><input id="o-minAlloc" type="number" value="100"></div>
        </div>

        <h3>Allocation & Rules</h3>
        <div class="form-grid">
            <div class="form-group"><label>Allocation Method</label>
                <select id="o-allocMethod">
                    <option value="PRICE_TIME">PRICE_TIME</option>
                    <option value="PRO_RATA">PRO_RATA</option>
                    <option value="PRIORITY_GROUP_PRO_RATA">PRIORITY_GROUP_PRO_RATA</option>
                </select>
            </div>
            <div class="form-group"><label>Cprice Publish Mode</label>
                <select id="o-cpriceMode">
                    <option value="MIN_IPO_PRICE">MIN_IPO_PRICE</option>
                    <option value="NOT_PUBLISHED_AUTO_ON">NOT_PUBLISHED_AUTO_ON</option>
                    <option value="NOT_PUBLISHED_MANUAL_ON">NOT_PUBLISHED_MANUAL_ON</option>
                    <option value="PUBLISH_NOW">PUBLISH_NOW</option>
                </select>
            </div>
            <div class="form-group"><label>Preferential Bids</label>
                <select id="o-prefBids">
                    <option value="NO">NO</option>
                    <option value="LEAD_MANAGER_BD_ONLY">LEAD_MANAGER_BD_ONLY</option>
                    <option value="YES">YES</option>
                </select>
            </div>
            <div class="form-group"><label>Secondary Offers</label>
                <select id="o-secOffers">
                    <option value="NO">NO</option>
                    <option value="LEAD_MANAGER_BD_ONLY">LEAD_MANAGER_BD_ONLY</option>
                    <option value="YES">YES</option>
                </select>
            </div>
        </div>

        <div class="btn-row">
            <button onclick="createOffering()">Create Offering</button>
            <button class="secondary" onclick="fillSampleOffering()">Fill Sample Data</button>
        </div>
        <div id="offering-result"></div>

        <h2>Current Offerings</h2>
        <div id="offerings-list"><div class="empty">Loading...</div></div>
    </div>

    <!-- ===== ORDERS TAB ===== -->
    <div class="panel" id="panel-orders">
        <h2>Enter Order <button class="secondary refresh-btn" onclick="loadOrders()">↻ Refresh List</button></h2>

        <div class="form-grid">
            <div class="form-group"><label>Symbol *</label>
                <select id="ord-symbol"><option value="">-- select offering --</option></select>
            </div>
            <div class="form-group"><label>Side</label>
                <select id="ord-side">
                    <option value="BID">BID (Buy)</option>
                    <option value="OFFER">OFFER (Sell)</option>
                </select>
            </div>
            <div class="form-group"><label>Order Type</label>
                <select id="ord-type">
                    <option value="COMPETITIVE">COMPETITIVE</option>
                    <option value="PREFERENTIAL">PREFERENTIAL</option>
                    <option value="SECONDARY_SELL">SECONDARY_SELL</option>
                </select>
            </div>
            <div class="form-group"><label>Priority Group</label>
                <select id="ord-priority">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="form-group"><label>Quantity *</label><input id="ord-qty" type="number" value="1000"></div>
            <div class="form-group"><label>Price *</label><input id="ord-price" type="number" step="0.01" value="20.00"></div>
            <div class="form-group"><label>User ID *</label>
                <select id="ord-user">
                    <option value="bd1">bd1</option>
                    <option value="bd2">bd2</option>
                    <option value="bd3">bd3</option>
                </select>
            </div>
            <div class="form-group"><label>Account</label><input id="ord-account" placeholder="optional"></div>
        </div>

        <div class="btn-row">
            <button onclick="createOrder()">Submit Order</button>
            <button class="secondary" onclick="createBulkOrders()">Submit 5 Random Orders</button>
        </div>
        <div id="order-result"></div>

        <h2>Current Orders</h2>
        <div id="orders-list"><div class="empty">Loading...</div></div>
    </div>

    <!-- ===== FIX TAB ===== -->
    <div class="panel" id="panel-fix">
        <h2>FIX Session</h2>
        <div class="form-grid">
            <div class="form-group"><label>Host</label><input id="fix-host" value="localhost"></div>
            <div class="form-group"><label>Port</label><input id="fix-port" type="number" value="9878"></div>
            <div class="form-group"><label>SenderCompID</label><input id="fix-sender" value="CLIENT_COMP"></div>
            <div class="form-group"><label>TargetCompID</label><input id="fix-target" value="CBID"></div>
        </div>
        <div class="btn-row">
            <button onclick="fixStartSession()">Start Session</button>
            <button class="danger" onclick="fixStopSession()">Stop Session</button>
            <button class="secondary" onclick="fixGetStatus()">Get Status</button>
        </div>
        <div id="fix-status"></div>

        <h2>FIX Order Entry</h2>
        <div class="form-grid">
            <div class="form-group"><label>Symbol</label><input id="fix-symbol" placeholder="e.g. LNRG"></div>
            <div class="form-group"><label>Quantity</label><input id="fix-qty" type="number" value="1000"></div>
            <div class="form-group"><label>Price</label><input id="fix-price" type="number" step="0.01" value="20.00"></div>
            <div class="form-group"><label>BD User</label><input id="fix-bduser" value="bd1"></div>
        </div>
        <div class="btn-row">
            <button onclick="fixSendOrder()">Send FIX Order</button>
        </div>
        <div id="fix-result"></div>

        <h2>FIX Logs <button class="secondary refresh-btn" onclick="fixGetLogs()">↻ Refresh</button></h2>
        <div id="fix-logs"><div class="empty">No logs yet</div></div>
    </div>

    <script>
    const API = '';

    // ===== TAB SWITCHING =====
    function switchTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
        document.getElementById('panel-' + name).classList.add('active');
        if (name === 'offerings') loadOfferings();
        if (name === 'orders') { loadSymbols(); loadOrders(); }
        if (name === 'fix') fixGetStatus();
    }

    // ===== HELPERS =====
    function showResult(elId, msg, type) {
        const el = document.getElementById(elId);
        el.className = 'result ' + type;
        el.textContent = typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg;
    }

    async function api(method, path, body) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(API + path, opts);
        return r.json();
    }

    // ===== OFFERINGS =====
    function fillSampleOffering() {
        document.getElementById('o-symbol').value = 'LNRG';
        document.getElementById('o-name').value = 'LunarEnergy Inc.';
        document.getElementById('o-issuer').value = 'LunarEnergy';
        document.getElementById('o-market').value = 'CB';
        document.getElementById('o-minPrice').value = '10.00';
        document.getElementById('o-maxPrice').value = '50.00';
        document.getElementById('o-minIPO').value = '15.00';
        document.getElementById('o-lowRange').value = '18.00';
        document.getElementById('o-highRange').value = '22.00';
        document.getElementById('o-priceInc').value = '0.01';
        document.getElementById('o-primaryQty').value = '1000000';
        document.getElementById('o-upsizeQty').value = '150000';
        document.getElementById('o-minBidQty').value = '100';
        document.getElementById('o-maxBidQty').value = '500000';
        document.getElementById('o-qtyInc').value = '100';
        document.getElementById('o-minAlloc').value = '100';
    }

    async function createOffering() {
        const now = new Date();
        const tomorrow = new Date(now.getTime() + 86400000);
        const nextWeek = new Date(now.getTime() + 7 * 86400000);

        const offering = {
            symbol: document.getElementById('o-symbol').value,
            name: document.getElementById('o-name').value,
            issuer: document.getElementById('o-issuer').value,
            market: document.getElementById('o-market').value || 'CB',
            assetType: document.getElementById('o-assetType').value,
            securityType: document.getElementById('o-securityType').value,
            state: 'NEW',
            minPriceAllowed: parseFloat(document.getElementById('o-minPrice').value) || 0,
            maxPriceAllowed: parseFloat(document.getElementById('o-maxPrice').value) || 0,
            minAcceptableIpoPrice: parseFloat(document.getElementById('o-minIPO').value) || 0,
            lowPriceRange: parseFloat(document.getElementById('o-lowRange').value) || 0,
            highPriceRange: parseFloat(document.getElementById('o-highRange').value) || 0,
            priceIncrement: parseFloat(document.getElementById('o-priceInc').value) || 0.01,
            primaryQuantity: parseInt(document.getElementById('o-primaryQty').value) || 0,
            upsizeQuantity: parseInt(document.getElementById('o-upsizeQty').value) || 0,
            minBidQuantity: parseInt(document.getElementById('o-minBidQty').value) || 100,
            maxBidQuantity: parseInt(document.getElementById('o-maxBidQty').value) || 0,
            qtyIncrement: parseInt(document.getElementById('o-qtyInc').value) || 100,
            minAllocationPerAccount: parseInt(document.getElementById('o-minAlloc').value) || 100,
            allocationMethod: document.getElementById('o-allocMethod').value,
            cpricePublishMode: document.getElementById('o-cpriceMode').value,
            preferentialBidsAllowed: document.getElementById('o-prefBids').value,
            secondaryOffersAllowed: document.getElementById('o-secOffers').value,
            announcementDate: now.toISOString(),
            bidPeriodStartDate: tomorrow.toISOString(),
            scheduledCloseDate: nextWeek.toISOString(),
            grossUnderwritingSpread: 0.07,
            sellingConcession: 0.04,
        };

        if (!offering.symbol || !offering.name || !offering.issuer) {
            showResult('offering-result', 'Symbol, Name, and Issuer are required', 'error');
            return;
        }

        try {
            const data = await api('POST', '/api/offerings', offering);
            if (data.error) {
                showResult('offering-result', data.message || data.error, 'error');
            } else {
                showResult('offering-result', 'Created offering: ' + data.symbol + ' (id: ' + data.id + ')', 'success');
                loadOfferings();
            }
        } catch (e) {
            showResult('offering-result', e.message, 'error');
        }
    }

    async function loadOfferings() {
        try {
            const data = await api('GET', '/api/offerings');
            const list = Array.isArray(data) ? data : (data.offerings || []);
            if (list.length === 0) {
                document.getElementById('offerings-list').innerHTML = '<div class="empty">No offerings yet. Create one above.</div>';
                return;
            }
            let html = '<table><thead><tr><th>Symbol</th><th>Name</th><th>State</th><th>Price Range</th><th>Primary Qty</th><th>Actions</th></tr></thead><tbody>';
            list.forEach(o => {
                html += `<tr>
                    <td><strong>${o.symbol}</strong></td>
                    <td>${o.name}</td>
                    <td><span class="badge ${o.state}">${o.state}</span></td>
                    <td>$${o.lowPriceRange} - $${o.highPriceRange}</td>
                    <td>${(o.primaryQuantity || 0).toLocaleString()}</td>
                    <td><div class="state-btns">${stateButtons(o)}</div></td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('offerings-list').innerHTML = html;
        } catch (e) {
            document.getElementById('offerings-list').innerHTML = '<div class="empty">Error loading offerings</div>';
        }
    }

    function stateButtons(o) {
        const transitions = {
            'NEW': ['UPCOMING'],
            'UPCOMING': ['OPEN', 'CANCELED'],
            'OPEN': ['CLOSE_PENDING', 'HALTED', 'CANCELED'],
            'CLOSE_PENDING': ['CLOSING'],
            'CLOSING': ['CLEARING'],
            'CLEARING': ['CLOSED'],
            'HALTED': ['OPEN', 'CANCELED'],
            'FROZEN': ['OPEN'],
        };
        const targets = transitions[o.state] || [];
        return targets.map(t =>
            `<button class="secondary" onclick="changeState('${o.id}','${t}')">${t}</button>`
        ).join('');
    }

    async function changeState(id, targetState) {
        try {
            const data = await api('POST', '/api/offerings/' + id + '/state', {
                targetState: targetState,
                reason: 'Manual state change from manage UI',
                userId: 'lm1'
            });
            if (data.error) {
                showResult('offering-result', data.message || data.error, 'error');
            } else {
                showResult('offering-result', 'State changed to ' + targetState, 'success');
                loadOfferings();
            }
        } catch (e) {
            showResult('offering-result', e.message, 'error');
        }
    }

    // ===== ORDERS =====
    async function loadSymbols() {
        try {
            const data = await api('GET', '/api/offerings');
            const sel = document.getElementById('ord-symbol');
            const current = sel.value;
            sel.innerHTML = '<option value="">-- select offering --</option>';
            const offerings = Array.isArray(data) ? data : (data.offerings || []);
            offerings.forEach(o => {
                if (o.state === 'OPEN' || o.state === 'CLOSE_PENDING' || o.state === 'CLOSING') {
                    sel.innerHTML += `<option value="${o.symbol}" ${o.symbol === current ? 'selected' : ''}>${o.symbol} - ${o.name} (${o.state})</option>`;
                }
            });
            // Also add all offerings as fallback
            offerings.forEach(o => {
                if (o.state !== 'OPEN' && o.state !== 'CLOSE_PENDING' && o.state !== 'CLOSING') {
                    sel.innerHTML += `<option value="${o.symbol}" ${o.symbol === current ? 'selected' : ''}>${o.symbol} - ${o.name} (${o.state})</option>`;
                }
            });
        } catch (e) {}
    }

    async function createOrder() {
        const order = {
            symbol: document.getElementById('ord-symbol').value,
            side: document.getElementById('ord-side').value,
            orderType: document.getElementById('ord-type').value,
            priorityGroup: parseInt(document.getElementById('ord-priority').value),
            quantity: parseInt(document.getElementById('ord-qty').value),
            price: parseFloat(document.getElementById('ord-price').value),
            userId: document.getElementById('ord-user').value,
            account: document.getElementById('ord-account').value || '',
        };

        if (!order.symbol || !order.quantity || !order.price) {
            showResult('order-result', 'Symbol, quantity, and price are required', 'error');
            return;
        }

        try {
            const data = await api('POST', '/api/orders', order);
            if (data.error) {
                showResult('order-result', data.message || data.error, 'error');
            } else {
                showResult('order-result', `Order created: ${data.side} ${data.quantity} ${data.symbol} @ $${data.price} (id: ${data.id})`, 'success');
                loadOrders();
            }
        } catch (e) {
            showResult('order-result', e.message, 'error');
        }
    }

    async function createBulkOrders() {
        const symbol = document.getElementById('ord-symbol').value;
        if (!symbol) { showResult('order-result', 'Select a symbol first', 'error'); return; }

        const users = ['bd1', 'bd2', 'bd3'];
        const basePrice = parseFloat(document.getElementById('ord-price').value) || 20;
        let results = [];

        for (let i = 0; i < 5; i++) {
            const price = basePrice + (Math.random() * 4 - 2); // ±$2 from base
            const qty = (Math.floor(Math.random() * 50) + 1) * 100; // 100-5000 in 100s
            const order = {
                symbol: symbol,
                side: 'BID',
                orderType: 'COMPETITIVE',
                priorityGroup: Math.floor(Math.random() * 3) + 1,
                quantity: qty,
                price: Math.round(price * 100) / 100,
                userId: users[Math.floor(Math.random() * users.length)],
            };
            try {
                const data = await api('POST', '/api/orders', order);
                results.push(data.error ? `✗ ${data.message}` : `✓ ${qty} @ $${order.price} (${order.userId})`);
            } catch (e) {
                results.push(`✗ ${e.message}`);
            }
        }
        showResult('order-result', results.join('\n'), 'info');
        loadOrders();
    }

    async function loadOrders() {
        try {
            const data = await api('GET', '/api/orders');
            const list = Array.isArray(data) ? data : (data.orders || []);
            if (list.length === 0) {
                document.getElementById('orders-list').innerHTML = '<div class="empty">No orders yet. Submit one above.</div>';
                return;
            }
            let html = '<table><thead><tr><th>Symbol</th><th>Side</th><th>Type</th><th>Qty</th><th>Price</th><th>PG</th><th>User</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
            list.slice(0, 50).forEach(o => {
                const cancelBtn = o.status === 'ACTIVE' ? `<button class="danger" style="font-size:0.75em;padding:3px 8px" onclick="cancelOrder('${o.id}','${o.userId}')">Cancel</button>` : '';
                html += `<tr>
                    <td>${o.symbol}</td>
                    <td><span class="badge ${o.side}">${o.side}</span></td>
                    <td>${o.orderType}</td>
                    <td>${(o.quantity || 0).toLocaleString()}</td>
                    <td>$${(o.price || 0).toFixed(2)}</td>
                    <td>${o.priorityGroup}</td>
                    <td>${o.userId}</td>
                    <td><span class="badge ${o.status}">${o.status}</span></td>
                    <td>${cancelBtn}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            if (list.length > 50) html += `<div class="empty">Showing 50 of ${list.length} orders</div>`;
            document.getElementById('orders-list').innerHTML = html;
        } catch (e) {
            document.getElementById('orders-list').innerHTML = '<div class="empty">Error loading orders</div>';
        }
    }

    async function cancelOrder(id, userId) {
        try {
            const data = await api('DELETE', '/api/orders/' + id, { userId: userId, reason: 'Canceled from manage UI' });
            if (data.error) {
                showResult('order-result', data.message, 'error');
            } else {
                showResult('order-result', 'Order canceled', 'success');
                loadOrders();
            }
        } catch (e) {
            showResult('order-result', e.message, 'error');
        }
    }

    // ===== FIX =====
    async function fixStartSession() {
        try {
            const data = await api('POST', '/api/fix/session/start', {
                host: document.getElementById('fix-host').value,
                port: parseInt(document.getElementById('fix-port').value),
                senderCompId: document.getElementById('fix-sender').value,
                targetCompId: document.getElementById('fix-target').value,
                simulated: true,
                heartbeatInterval: 30,
            });
            showResult('fix-status', data, data.success ? 'success' : 'error');
        } catch (e) { showResult('fix-status', e.message, 'error'); }
    }

    async function fixStopSession() {
        try {
            const data = await api('POST', '/api/fix/session/stop');
            showResult('fix-status', data, data.success ? 'success' : 'error');
        } catch (e) { showResult('fix-status', e.message, 'error'); }
    }

    async function fixGetStatus() {
        try {
            const data = await api('GET', '/api/fix/session/status');
            showResult('fix-status', data, 'info');
        } catch (e) { showResult('fix-status', e.message, 'error'); }
    }

    async function fixSendOrder() {
        try {
            const data = await api('POST', '/api/fix/orders', {
                symbol: document.getElementById('fix-symbol').value,
                quantity: parseInt(document.getElementById('fix-qty').value),
                price: parseFloat(document.getElementById('fix-price').value),
                priorityGroup: 1,
                bdUser: document.getElementById('fix-bduser').value,
            });
            showResult('fix-result', data, data.success ? 'success' : 'error');
            fixGetLogs();
        } catch (e) { showResult('fix-result', e.message, 'error'); }
    }

    async function fixGetLogs() {
        try {
            const data = await api('GET', '/api/fix/logs?limit=20');
            const logs = Array.isArray(data) ? data : (data.logs || []);
            if (logs.length === 0) {
                document.getElementById('fix-logs').innerHTML = '<div class="empty">No logs yet</div>';
                return;
            }
            let html = '<table><thead><tr><th>Time</th><th>Dir</th><th>Level</th><th>Message</th></tr></thead><tbody>';
            logs.forEach(l => {
                const t = new Date(l.timestamp).toLocaleTimeString();
                const dir = l.direction === 'OUT' ? '→' : l.direction === 'IN' ? '←' : '·';
                html += `<tr><td>${t}</td><td>${dir}</td><td>${l.level}</td><td style="font-size:0.8em">${l.message}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('fix-logs').innerHTML = html;
        } catch (e) {
            document.getElementById('fix-logs').innerHTML = '<div class="empty">Error loading logs</div>';
        }
    }

    // ===== INIT =====
    loadOfferings();
    </script>
</body>
</html>
